name: gharaima_app
description: A Flutter mobile application for a home services marketplace in Nepal.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  google_fonts: ^6.1.0
  google_maps_flutter: ^2.5.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  intl: ^0.18.0
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
